name: CI/CD - ResumeBuddy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ Lint & Type Check ============
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  # ============ Unit Tests ============
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: resumebuddy_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Generate Prisma client
      - run: cd packages/database && npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resumebuddy_test

      # Run migrations
      - run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resumebuddy_test

      # Run unit tests
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resumebuddy_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          NODE_ENV: test

  # ============ Build ============
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: cd packages/database && npx prisma generate
      - run: pnpm build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/resumebuddy_test
          REDIS_URL: redis://localhost:6379

  # ============ Deploy (main branch only) ============
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/resumebuddy
            git pull origin main
            cd infrastructure/docker
            docker compose -f docker-compose.prod.yml --env-file .env.production build
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm web sh -c "cd packages/database && npx prisma migrate deploy"
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            sleep 15
            curl -sf https://${{ secrets.DOMAIN }}/api/health || echo "WARNING: Health check failed"
